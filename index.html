<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熊本銀杏之旅 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --paper:#f8f5f0;--white:#fff;--ink:#1a1610;--ink2:#3a342a;
  --mid:#7a7060;--light:#c0b8a8;--rule:#e0d8cc;
  --red:#b8232a;--gold:#b07010;--warm:#f0ebe2;
  --shadow:0 2px 16px rgba(30,22,10,.09);
  --shadow-h:0 6px 32px rgba(30,22,10,.16);
  --r:10px;
  --song:'Songti SC','Songti TC','SimSun','NSimSun','PMingLiU','MingLiU',serif;
  --gara:'EB Garamond',serif;
}
html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:var(--song);-webkit-font-smoothing:antialiased;line-height:1.7;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}

/* NAVBAR */
#navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(248,245,240,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:54px;transition:box-shadow .3s;}
#navbar.scrolled{box-shadow:0 2px 20px rgba(30,22,10,.1);}
.nav-brand{font-family:var(--song);font-size:14px;font-weight:700;letter-spacing:.1em;}
.nav-brand .r{color:var(--red);}
.nav-links{display:flex;list-style:none;}
.nav-links a{font-family:var(--gara);font-size:11.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--mid);padding:0 13px;line-height:54px;display:block;transition:color .2s;}
.nav-links a:hover{color:var(--red);}
.nav-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.nav-toggle span{width:22px;height:1.5px;background:var(--ink);display:block;}

/* HERO */
#hero{min-height:100vh;position:relative;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;background:linear-gradient(158deg,#120a04 0%,#241408 35%,#1c2a10 70%,#0e1a08 100%);}
.hero-deco{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 55% 35% at 75% 25%,rgba(180,70,10,.28) 0%,transparent 65%),radial-gradient(ellipse 40% 45% at 15% 65%,rgba(10,55,25,.25) 0%,transparent 65%),radial-gradient(ellipse 25% 25% at 55% 85%,rgba(180,110,10,.18) 0%,transparent 60%);}
.hero-body{position:relative;z-index:2;padding:0 7% 7%;max-width:820px;}
.hero-tag{display:inline-flex;align-items:center;gap:10px;margin-bottom:20px;opacity:0;animation:up .8s .2s forwards;}
.hero-tag-line{width:28px;height:1px;background:#c04040;}
.hero-tag-text{font-family:var(--gara);font-size:11px;letter-spacing:.42em;color:rgba(255,255,255,.6);text-transform:uppercase;}
.hero-title{font-family:var(--song);font-weight:400;font-size:clamp(36px,7vw,70px);color:#f5ede0;line-height:1.15;letter-spacing:.14em;margin-bottom:14px;opacity:0;animation:up .9s .4s forwards;}
.hero-title .r{color:#f07070;}
.hero-title .g{color:#e8c060;}
.hero-sub{font-family:var(--gara);font-style:italic;font-size:clamp(14px,1.8vw,19px);color:rgba(255,255,255,.65);letter-spacing:.08em;margin-bottom:30px;opacity:0;animation:up .9s .6s forwards;}
.hero-chips{display:flex;flex-wrap:wrap;gap:9px;opacity:0;animation:up .9s .8s forwards;}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(6px);color:rgba(255,255,255,.88);padding:5px 15px;border-radius:100px;font-family:var(--gara);font-size:12.5px;letter-spacing:.08em;}
.chip.red{background:rgba(184,35,42,.4);border-color:rgba(200,60,60,.5);}
.hero-scroll{position:absolute;bottom:28px;right:7%;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;opacity:0;animation:up .9s 1.2s forwards;}
.scroll-bar{width:1px;height:44px;background:linear-gradient(to bottom,rgba(255,255,255,.55),transparent);animation:pulse 2s infinite;}
.scroll-txt{font-family:var(--gara);font-size:10px;letter-spacing:.35em;color:rgba(255,255,255,.4);writing-mode:vertical-rl;text-transform:uppercase;}
@keyframes up{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}

/* SECTIONS */
.wrap{max-width:1060px;margin:0 auto;padding:0 5%;}
.sec-head{text-align:center;padding:76px 0 48px;}
.eyebrow{display:block;font-family:var(--gara);font-size:11px;letter-spacing:.5em;color:var(--red);text-transform:uppercase;margin-bottom:10px;}
.sec-title{font-family:var(--song);font-weight:400;font-size:clamp(20px,3.5vw,30px);color:var(--ink);letter-spacing:.12em;}
.sec-rule{width:38px;height:2px;background:var(--red);margin:13px auto 0;border-radius:2px;}

/* MAP */
#route{background:var(--white);}
#map{height:450px;border-radius:var(--r);border:1px solid var(--rule);box-shadow:var(--shadow);overflow:hidden;}
#map-legend{display:flex;flex-wrap:wrap;gap:9px 18px;margin-top:16px;padding:14px 18px;background:var(--warm);border-radius:var(--r);border:1px solid var(--rule);}
.leg-item{display:flex;align-items:center;gap:7px;font-family:var(--gara);font-size:12.5px;color:var(--ink2);}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}

/* DAYS */
#days{background:var(--paper);padding-bottom:40px;}
.day-block{margin-bottom:72px;opacity:0;transform:translateY(18px);transition:opacity .6s,transform .6s;}
.day-block.vis{opacity:1;transform:translateY(0);}
.day-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:12px 16px;padding-bottom:14px;border-bottom:2px solid var(--ink);margin-bottom:28px;}
.dn-label{font-family:var(--gara);font-size:11px;letter-spacing:.4em;color:var(--light);text-transform:uppercase;}
.dn-big{font-family:var(--gara);font-size:46px;line-height:1;color:var(--ink);letter-spacing:-.02em;}
.d-title{font-family:var(--song);font-size:20px;font-weight:400;color:var(--ink);letter-spacing:.1em;}
